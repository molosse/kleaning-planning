<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <!-- Viewport optimisé mobile : pas de zoom, respect safe areas iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="robots" content="noindex, nofollow"/>
  <!-- PWA / App mobile -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kleaning"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>Kleaning — Planning</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>"/>
  <style>
    /* Éviter le bounce scroll iOS hors de l'app */
    html { height: 100%; overflow: hidden; }
    body { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    /* Éviter la sélection de texte involontaire sur mobile */
    button { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
